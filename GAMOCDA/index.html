<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.cdnfonts.com/css/satoshi" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="header">
      <!-- ჰედერის მარცხენა მხარე  -->
      <section class="header-left">
        <div>
          <img src="./assets/library-icon.png" alt="my library" />
          <p>My Library</p>
        </div>
        <div>
          <img src="./assets/home-icon.png" alt="home icon" />
          <p>Home</p>
        </div>
        <div>
          <img src="./assets/discover-icon.png" alt="discover icon" />
          <p>Discover</p>
        </div>
        <div>
          <img src="./assets/search-icon.png" alt="search icon" />
          <form action="#">
            <input type="text" placeholder="Search" name="search" />
          </form>
        </div>
      </section>
      <!-- ჰედერის მარჯვენა მხარე -->
      <section class="header-right">
        <!-- სურათები დივში ჩავსვი იმიტო რო აიკონები ზომას იცვლიდნენ  -->
        <div>
          <img src="./assets/bell-icon.png" alt="bell icon" />
        </div>
        <div>
          <img src="./assets/lock-icon.png" alt="lock icon" />
        </div>
        <div>
          <img src="./assets/people-icon.png" alt="people icon" />
        </div>
        <div>
          <img src="./assets/setting-icon.png" alt="setting icon" />
        </div>
        <div>
          <img src="./assets/Sprite-0002 1.png" alt="sprite-0002 icon" />
        </div>
      </section>
    </header>
    <main>
      <aside class="aside">
        <div class="aside-container">
          <div>
            <img src="./assets/aside-icons/pin-icon.png" alt="pins icon" />
            <p>Pins</p>
            <img
              class="aside-arrow-right-icon1"
              src="./assets/aside-icons/arrow-right.png"
              alt="arrow right icon"
            />
          </div>
          <div>
            <img
              src="./assets/aside-icons/playlists-icon.png"
              alt="Playlists icon"
            />
            <p>Playlists</p>
            <img
              class="aside-arrow-right-icon2"
              src="./assets/aside-icons/arrow-right.png"
              alt="arrow right icon"
            />
          </div>
          <div>
            <img
              src="./assets/aside-icons/liked-songs-icon.png"
              alt="liked songs icon"
            />
            <p>Liked songs</p>
          </div>
          <div>
            <img src="./assets/aside-icons/saves-icon.png" alt="saves icon" />
            <p>Saves</p>
          </div>
          <div>
            <img src="./assets/aside-icons/albums-icon.png" alt="albums icon" />
            <p>Albums</p>
          </div>
          <div>
            <img
              src="./assets/aside-icons/folders-icon.png"
              alt="folders icon"
            />
            <p>Folders</p>
          </div>
          <div>
            <img
              src="./assets/aside-icons/podcasts-icon.png"
              alt="podcasts icon"
            />
            <p>Podcasts</p>
          </div>
          <div>
            <img
              src="./assets/aside-icons/audiobooks-icon.png"
              alt="Audiobooks icon"
            />
            <p>Audiobooks</p>
          </div>
          <div>
            <img
              src="./assets/aside-icons/artists-icon.png"
              alt="Artists icon"
            />
            <p>Artists</p>
          </div>
        </div>
      </aside>
    </main>
  </body>
</html>
